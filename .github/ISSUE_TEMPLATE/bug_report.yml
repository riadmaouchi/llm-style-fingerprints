name: Bug report
description: Incorrect result, crash, or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
